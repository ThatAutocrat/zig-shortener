<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ ZigLink — URL Shortener</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #7c6aff;
      --accent2: #4ff0b4;
      --text: #f0f0f8;
      --muted: #888;
      --error: #ff6b6b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(124,106,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(79,240,180,0.07) 0%, transparent 60%);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(124,106,255,0.08), 0 24px 48px rgba(0,0,0,0.4);
    }

    /* ── Header ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }
    .logo-icon {
      font-size: 1.8rem;
      line-height: 1;
    }
    .logo h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 2rem;
      padding-left: 2.4rem;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.4rem;
    }
    input[type="url"] {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="url"]::placeholder { color: var(--muted); }
    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
    }

    button[type="submit"] {
      background: linear-gradient(135deg, var(--accent), #5b4fcc);
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.3rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
    }
    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:active { transform: scale(0.97); }

    /* HTMX loading indicator */
    button[type="submit"].htmx-request {
      opacity: 0.6;
      pointer-events: none;
    }

    /* ── Result area ── */
    #result { min-height: 2rem; }

    .result {
      background: rgba(79,240,180,0.06);
      border: 1px solid rgba(79,240,180,0.2);
      border-radius: 14px;
      padding: 1.2rem 1.2rem;
      animation: fadeIn 0.3s ease;
    }
    .label {
      font-size: 0.75rem;
      color: var(--accent2);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .link-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .short-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--accent2);
      text-decoration: none;
      word-break: break-all;
    }
    .short-link:hover { text-decoration: underline; }

    .copy-btn {
      background: rgba(79,240,180,0.12);
      border: 1px solid rgba(79,240,180,0.25);
      border-radius: 8px;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      color: var(--accent2);
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }
    .copy-btn:hover { background: rgba(79,240,180,0.2); }

    .error {
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.25);
      border-radius: 12px;
      padding: 0.9rem 1rem;
      font-size: 0.88rem;
      color: var(--error);
      animation: fadeIn 0.3s ease;
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .stats strong { color: var(--text); font-weight: 600; }

    /* ── Footer ── */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Header -->
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <h1>ZigLink</h1>
    </div>
    <p class="tagline">Powered by a raw Zig HTTP server. Zero dependencies.</p>

    <!-- Shorten form -->
    <form
      hx-post="/shorten"
      hx-target="#result"
      hx-swap="innerHTML"
      hx-indicator="#shorten-btn"
    >
      <div class="form-row">
        <input
          type="url"
          name="url"
          placeholder="https://your-very-long-url.com/goes/here"
          required
          autocomplete="off"
        />
        <button type="submit" id="shorten-btn">Shorten ⚡</button>
      </div>
    </form>

    <!-- Result appears here -->
    <div id="result"></div>

    <!-- Live stats — auto-refresh every 3s via HTMX -->
    <div
      id="stats"
      hx-get="/stats"
      hx-trigger="load, every 3s"
      hx-swap="innerHTML"
    >
      <div class="stats">
        <span>Loading stats...</span>
      </div>
    </div>
  </div>

  <p class="footer">⚡ zig 0.12 · htmx · no npm · no framework</p>
</body>
</html>
